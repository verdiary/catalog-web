site_name: Справочник садовода
theme:
  name: material
  palette:
    # Автоматическое переключение темы в зависимости от системных настроек
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/weather-sunny
        name: Переключиться на темную тему
    # Темная тема
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/weather-night
        name: Переключиться на светлую тему
  features:
    - navigation.tabs # Вкладки категорий сверху (Овощи, Фрукты...)
    - navigation.sections # Секции в сайдбаре
    - search.suggest # Поиск с подсказками
    - content.code.copy # Кнопка копирования (для рецептов/таблиц)

markdown_extensions:
  - admonition # Для блоков [!tip] и [!warning] (ваши нюансы)
  - tables # Поддержка таблиц
  - pymdownx.emoji # Поддержка эмодзи

nav:
  - Главная: index.md
  - Овощи:
      - Корнеплоды:
          - Сельдерей корневой 'Пражский Гигант': ovoshhi/korneplody/seledrey_kornevoy_pragskiy_gigant.md
      - Паслёновые: []
      - Капустные: []
      - Луковичные:
          - Лук репчатый 'Голд Стар': ovoshhi/lukovichnye/luk_repchaty_gold_star.md
          - Лук-порей 'Италико': ovoshhi/lukovichnye/luk_porrey_italiko.md
      - Тыквенные: []
      - Зелень: []
  - Плодовые: []
  - Цветы: []
